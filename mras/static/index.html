<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal RAG Agent System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'IBM Plex Sans', 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #fff;
      background: #0a0a0a;
      height: 100vh;
      overflow: hidden;
    }
    .layout {
      display: flex;
      height: 100vh;
    }
    /* Left sidebar - Documents (always visible) */
    .sidebar-left {
      width: 260px;
      min-width: 260px;
      background: #0f0f0f;
      border-right: 1px solid #262626;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-left .header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #262626;
      flex-shrink: 0;
    }
    .sidebar-left .header h2 {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #737373;
      margin: 0;
    }
    .documents-upload {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #262626;
      flex-shrink: 0;
    }
    .documents-upload input[type="file"] {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #262626;
      color: #737373;
      padding: 0.5rem;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .documents-upload input[type="file"]::file-selector-button {
      background: #262626;
      border: none;
      color: #fff;
      padding: 0.35rem 0.6rem;
      font-size: 0.7rem;
      margin-right: 0.75rem;
      cursor: pointer;
    }
    .documents-upload button {
      margin-top: 0.5rem;
      background: #fff;
      color: #0a0a0a;
      border: none;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
    }
    .documents-upload button:hover:not(:disabled) { opacity: 0.9; }
    .documents-upload button:disabled { opacity: 0.4; cursor: not-allowed; }
    .documents-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0.75rem 1.25rem;
    }
    .documents-list-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: #525252;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .doc-item {
      font-size: 0.8rem;
      color: #a3a3a3;
      padding: 0.4rem 0;
      border-bottom: 1px solid #1a1a1a;
      word-break: break-all;
    }
    .doc-item:last-child { border-bottom: none; }
    .documents-empty {
      font-size: 0.75rem;
      color: #404040;
      font-style: italic;
    }
    .upload-feedback {
      font-size: 0.7rem;
      padding: 0.35rem 0;
      margin-top: 0.25rem;
    }
    .upload-feedback.success { color: #737373; }
    .upload-feedback.error { color: #a3a3a3; }

    /* Center - Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #0a0a0a;
    }
    .chat-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #262626;
      flex-shrink: 0;
    }
    .chat-header h1 {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #737373;
      margin: 0 0 0.25rem 0;
    }
    .chat-header p {
      font-size: 0.8rem;
      color: #525252;
      margin: 0;
    }
    .chat-messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .chat-msg {
      max-width: 85%;
      padding: 0.9rem 1.1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: #262626;
      color: #e5e5e5;
    }
    .chat-msg.assistant {
      align-self: flex-start;
      background: #141414;
      border: 1px solid #262626;
      color: #e5e5e5;
    }
    .chat-msg .sources {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #525252;
    }
    .chat-msg .sources ul {
      margin: 0.25rem 0 0 1rem;
      padding: 0;
    }
    .chat-input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid #262626;
      flex-shrink: 0;
      background: #0a0a0a;
      position: relative;
      z-index: 1;
    }
    .chat-input-row {
      display: flex;
      gap: 0.5rem;
    }
    .chat-input-area input {
      flex: 1;
      min-width: 0;
      background: #141414;
      border: 2px solid #404040;
      color: #fff;
      padding: 0.75rem 1rem;
      font-family: inherit;
      font-size: 0.9rem;
      transition: border-color 0.15s, background-color 0.15s;
      pointer-events: auto;
      -webkit-user-select: text;
      user-select: text;
    }
    .chat-input-area input:hover {
      border-color: #525252;
    }
    .chat-input-area input:focus {
      outline: none;
      border-color: #737373;
      background: #1a1a1a;
    }
    .chat-input-area input::placeholder {
      color: #737373;
    }
    .chat-input-area button {
      background: #fff;
      color: #0a0a0a;
      border: none;
      padding: 0.6rem 1.25rem;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
    }
    .chat-input-area button:hover:not(:disabled) { opacity: 0.9; }
    .chat-input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
    .chat-feedback {
      font-size: 0.75rem;
      padding: 0.5rem 0;
      color: #a3a3a3;
    }
    .chat-welcome {
      color: #525252;
      font-size: 0.9rem;
      text-align: center;
      padding: 3rem 2rem;
    }

    /* Right sidebar - Evaluation */
    .sidebar-right {
      width: 280px;
      min-width: 280px;
      background: #0f0f0f;
      border-left: 1px solid #262626;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-right .header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #262626;
      flex-shrink: 0;
    }
    .sidebar-right .header h2 {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #737373;
      margin: 0;
    }
    .eval-content {
      padding: 1rem 1.25rem;
      flex: 1;
      overflow-y: auto;
    }
    .eval-content button {
      width: 100%;
      background: #fff;
      color: #0a0a0a;
      border: none;
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
    }
    .eval-content button:hover:not(:disabled) { opacity: 0.9; }
    .eval-content button:disabled { opacity: 0.4; cursor: not-allowed; }
    .eval-feedback {
      font-size: 0.75rem;
      padding: 0.5rem 0;
      margin-top: 0.5rem;
    }
    .eval-feedback.success { color: #737373; }
    .eval-feedback.error { color: #a3a3a3; }
    .eval-metrics {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .eval-metric {
      background: #141414;
      border: 1px solid #262626;
      padding: 1rem;
    }
    .eval-metric span {
      font-size: 0.65rem;
      color: #525252;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .eval-metric div {
      font-size: 1.1rem;
      margin-top: 0.25rem;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Left: Documents (always visible) -->
    <aside class="sidebar-left">
      <div class="header"><h2>Documents</h2></div>
      <div class="documents-upload">
        <input type="file" id="fileInput" accept=".txt,.md,.pdf" multiple>
        <button id="uploadBtn" type="button">Ingest</button>
        <div id="uploadFeedback" class="upload-feedback hidden"></div>
      </div>
      <div class="documents-list">
        <div class="documents-list-label">Uploaded</div>
        <div id="documentsList">
          <span class="documents-empty">No documents yet</span>
        </div>
      </div>
    </aside>

    <!-- Center: Chat area -->
    <main class="chat-area">
      <div class="chat-header">
        <h1>MRAS</h1>
        <p>Minimal RAG Agent System — Ask about your documents</p>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-welcome">Ask a question about your documents above.</div>
      </div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <input type="text" id="queryInput" placeholder="Ask about your documents..." autocomplete="off">
          <button id="queryBtn" type="button">Ask</button>
        </div>
        <div id="queryFeedback" class="chat-feedback hidden"></div>
      </div>
    </main>

    <!-- Right: Evaluation -->
    <aside class="sidebar-right">
      <div class="header"><h2>Evaluation</h2></div>
      <div class="eval-content">
        <button id="evalBtn" type="button">Run evaluation</button>
        <div id="evalFeedback" class="eval-feedback hidden"></div>
        <div id="evalResult" class="hidden">
          <div class="eval-metrics">
            <div class="eval-metric">
              <span>Keyword score</span>
              <div id="evalScore"></div>
            </div>
            <div class="eval-metric">
              <span>Avg latency (s)</span>
              <div id="evalLatency"></div>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script>
    const API = '';

    function feedback(el, msg, err) {
      el.textContent = msg;
      el.className = (el.classList.contains('upload-feedback') ? 'upload-feedback ' : el.classList.contains('eval-feedback') ? 'eval-feedback ' : 'chat-feedback ') + (err ? 'error' : 'success');
      el.classList.remove('hidden');
    }

    function hide(el) { el.classList.add('hidden'); }

    async function loadDocuments() {
      try {
        const r = await fetch(API + '/documents', { cache: 'no-store' });
        const d = await r.json().catch(() => ({}));
        const list = document.getElementById('documentsList');
        const docs = d.documents || [];
        if (docs.length === 0) {
          list.innerHTML = '<span class="documents-empty">No documents yet</span>';
        } else {
          list.innerHTML = docs.map(d => `<div class="doc-item">${d.name}</div>`).join('');
        }
      } catch (e) {
        document.getElementById('documentsList').innerHTML = '<span class="documents-empty">Error loading</span>';
      }
    }

    loadDocuments();

    document.getElementById('uploadBtn').onclick = async () => {
      const input = document.getElementById('fileInput');
      const fb = document.getElementById('uploadFeedback');
      const btn = document.getElementById('uploadBtn');
      if (!input.files.length) {
        feedback(fb, 'Select files', true);
        return;
      }
      btn.disabled = true;
      hide(fb);
      const fd = new FormData();
      for (const f of input.files) fd.append('files', f);
      try {
        const r = await fetch(API + '/upload', { method: 'POST', body: fd });
        const d = await r.json().catch(() => ({}));
        feedback(fb, r.ok ? `${d.chunks_indexed || 0} chunks indexed` : (d.detail || 'Failed'), !r.ok);
        if (r.ok) {
          input.value = '';
          loadDocuments();
        }
      } catch (e) {
        feedback(fb, e.message || 'Error', true);
      } finally {
        btn.disabled = false;
      }
    };

    document.getElementById('queryBtn').onclick = runQuery;
    document.getElementById('queryInput').onkeydown = function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        runQuery();
      }
    };

    function removeWelcome() {
      const welcome = document.querySelector('.chat-welcome');
      if (welcome) welcome.remove();
    }

    async function runQuery() {
      const input = document.getElementById('queryInput');
      const fb = document.getElementById('queryFeedback');
      const messages = document.getElementById('chatMessages');
      const btn = document.getElementById('queryBtn');
      const q = input.value.trim();
      if (!q) {
        feedback(fb, 'Enter a question', true);
        return;
      }
      btn.disabled = true;
      hide(fb);
      removeWelcome();

      const userMsg = document.createElement('div');
      userMsg.className = 'chat-msg user';
      userMsg.textContent = q;
      messages.appendChild(userMsg);
      input.value = '';

      const assistantMsg = document.createElement('div');
      assistantMsg.className = 'chat-msg assistant';
      assistantMsg.innerHTML = '<span class="loading">...</span>';
      messages.appendChild(assistantMsg);
      messages.scrollTop = messages.scrollHeight;

      try {
        const r = await fetch(API + '/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q, top_k: 5 })
        });
        const d = await r.json().catch(() => ({}));
        if (r.ok) {
          let html = (d.answer || '').replace(/\n/g, '<br>');
          if (d.sources?.length) {
            html += '<div class="sources">Sources: <ul><li>' + d.sources.join('</li><li>') + '</li></ul></div>';
          }
          assistantMsg.innerHTML = html;
        } else {
          assistantMsg.innerHTML = 'Error: ' + (d.detail || 'Query failed');
        }
      } catch (e) {
        assistantMsg.innerHTML = 'Error: ' + (e.message || 'Network error');
      } finally {
        btn.disabled = false;
        messages.scrollTop = messages.scrollHeight;
      }
    }

    document.getElementById('evalBtn').onclick = async () => {
      const fb = document.getElementById('evalFeedback');
      const res = document.getElementById('evalResult');
      const btn = document.getElementById('evalBtn');
      btn.disabled = true;
      hide(fb);
      res.classList.add('hidden');
      try {
        const r = await fetch(API + '/evaluate', { method: 'POST' });
        const d = await r.json().catch(() => ({}));
        if (r.ok) {
          document.getElementById('evalScore').textContent = (d.avg_keyword_score ?? 0).toFixed(4);
          document.getElementById('evalLatency').textContent = (d.avg_latency ?? 0).toFixed(3);
          res.classList.remove('hidden');
        } else {
          feedback(fb, d.detail || 'Evaluation failed', true);
        }
      } catch (e) {
        feedback(fb, e.message || 'Error', true);
      } finally {
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
